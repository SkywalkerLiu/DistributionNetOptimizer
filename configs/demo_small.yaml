scene:
  width_m: 240
  height_m: 240
  max_elevation_m: 120
  resolution_m: 4
  origin_x_m: 0
  origin_y_m: 240
  crs: EPSG:3857
  seed: 7

terrain:
  base_type: saddle
  add_perlin_noise: true
  noise_scale: 0.08
  noise_amplitude: 8.0
  noise_octaves: 3
  add_gaussian_hills: true
  hill_count: 5
  valley_ratio: 0.2
  smooth_sigma: 1.5
  clip_min: 0
  clip_max: 120
  max_buildable_slope_deg: 28.0
  max_buildable_roughness_m: 6.0
  roughness_window: 3

users:
  count: 12
  min_spacing_m: 12
  distribution_mode: clustered
  cluster_count: 3
  cluster_radius_m: 18
  load_kw_range: [1.0, 8.0]
  importance_range: [1, 3]

obstacles:
  forest_count: 3
  water_count: 1
  manual_no_build_count: 1
  min_area_m2: 150
  max_area_m2: 1000
  buffer_from_users_m: 6

planning:
  transformer_candidate_step_m: 20
  pole_candidate_step_m: 10
  forbidden_cost: 100000.0
  slope_weight: 2.0
  roughness_weight: 1.0

outputs:
  create_plots: true

visualization:
  terrain_3d_max_grid_size: 120
  terrain_3d_vertical_exaggeration: 2.5
  terrain_3d_camera_elev_deg: 38
  terrain_3d_camera_azim_deg: -55
