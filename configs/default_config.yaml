scene:
  width_m: 500
  height_m: 500
  max_elevation_m: 100
  resolution_m: 1
  origin_x_m: 0
  origin_y_m: 500
  crs: EPSG:3857
  seed: 98

terrain:
  base_type: ridge
  add_perlin_noise: false
  noise_scale: 0.01
  noise_amplitude: 5.0
  noise_octaves: 4
  add_gaussian_hills: true
  hill_count: 2
  hill_sigma_min: 0.15
  hill_sigma_max: 0.30
  valley_ratio: 0.25
  smooth_sigma: 15.0
  clip_min: 0
  clip_max: 100
  max_buildable_slope_deg: 24.0
  max_buildable_roughness_m: 10.0
  roughness_window: 5

users:
  count: 50
  min_spacing_m: 30
  distribution_mode: clustered
  cluster_count: 5
  cluster_radius_m: 200
  load_groups:
    - count: 40
      load_kw: 7.0
      power_factor: 0.85
      phase_type: single
    - count: 10
      load_kw: 12.0
      power_factor: 0.85
      phase_type: single
  load_kw_range: [7.0, 12.0]
  power_factor_range: [0.85, 0.85]
  default_phase_type: single
  importance_range: [1, 3]

obstacles:
  forest_count: 8
  water_count: 3
  manual_no_build_count: 2
  min_area_m2: 2000
  max_area_m2: 80000
  buffer_from_users_m: 20

planning:
  transformer_candidate_step_m: 100
  pole_candidate_step_m: 50
  path_search_step_m: 20
  transformer_capacity_kva: 630.0
  max_loading_ratio: 1.0
  transformer_fixed_cost: 120000.0
  pole_fixed_cost: 1800.0
  lv_pole_height_m: 9.5
  transformer_lv_connection_height_m: 8.5
  user_attachment_height_m: 4.0
  line_cost_per_m: 55.0
  service_line_cost_per_m: 35.0
  max_pole_span_m: 50.0
  max_service_drop_m: 25.0
  phase_balance_target_ratio: 0.10
  phase_balance_max_ratio: 0.15
  low_voltage_phase_v: 230.0
  low_voltage_line_v: 400.0
  voltage_drop_max_pct: 7.0
  lv_ground_clearance_m: 4.0
  service_ground_clearance_m: 2.3
  clearance_sample_step_m: 2.0
  clearance_search_radius_m: 12.0
  clearance_max_repair_depth: 6
  terrain_length_weight: 1.0
  terrain_slope_weight: 2.0
  terrain_roughness_weight: 1.0
  forbidden_edge_sample_step_m: 5.0
  forbidden_cost: 1000000.0
  slope_weight: 2.5
  roughness_weight: 1.5

planning_v2:
  enable_v2_optimizer: true
  tx_candidate_count: 60
  tx_prefilter_top_k: 6
  corridor_safe_margin_m: 12.0
  corridor_cluster_count: 6
  corridor_edge_max_length_m: 120.0
  corridor_neighbor_count: 12
  corridor_boundary_penalty_weight: 20.0
  build_cost_weight: 1.0
  path_length_penalty_weight: 20.0
  max_user_path_length_m: 300.0
  max_user_path_penalty_weight: 1000.0
  load_weighted_path_penalty_weight: 1.0
  root_feeder_min_count: 3
  root_feeder_count_penalty_weight: 50000.0
  phase_unbalance_weight: 3.0
  tx_unbalance_weight: 2.0
  segment_unbalance_weight: 1.0
  max_service_drop_m: 25.0
  max_pole_span_m: 50.0
  pole_user_clearance_m: 5.0
  line_user_clearance_m: 1.0
  voltage_drop_max_pct: 7.0
  phase_balance_target_ratio: 0.10
  phase_balance_max_ratio: 0.15
  milp_time_limit_s: 8
  solver_backend: highs
  mip_gap: 0.15
  parallel_candidate_eval: false
  parallel_workers: 1
  highs_threads_per_worker: 1
  local_search_top_k: 1
  local_search_patience: 2
  local_search_top_options: 1
  local_search_max_full_evals: 8
  emit_performance_metrics: true
  alns_max_iter: 20
  alns_destroy_ratio: 0.15
  candidate_solution_pool_size: 6
  final_geometry_check_top_k: 6
  show_progress: true
  progress_bar_width: 32

outputs:
  create_plots: true

visualization:
  terrain_3d_max_grid_size: 0
  terrain_3d_vertical_exaggeration: 3.0
  terrain_3d_camera_elev_deg: 40
  terrain_3d_camera_azim_deg: -60
